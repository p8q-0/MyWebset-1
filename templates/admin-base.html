<!doctype html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f9eff9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1025" media="(prefers-color-scheme: dark)">
  <title>{% block title %}Lumora Cosmetics Admin{% endblock %}</title>
  <meta name="description" content="Protected Lumora Cosmetics admin area.">
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script defer src="{{ url_for('static', filename='js/admin.js') }}"></script>
  {% block head %}{% endblock %}
</head>
<body class="admin-shell">
  <div class="page-shell">
    <header class="site-header admin-header">
      <a class="brand" href="{{ url_for('admin_dashboard_page') }}">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Lumora Cosmetics logo">
        <span>
          <strong>Lumora Admin</strong>
          <small>Product control</small>
        </span>
      </a>
      <nav class="site-nav admin-nav" aria-label="Admin">
        <a href="{{ url_for('index') }}">View Storefront</a>
        <button type="button" class="ghost-button" data-logout-button>Sign out</button>
      </nav>
    </header>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div class="toast-stack" aria-live="polite" aria-atomic="true" data-toast-stack></div>
  {% block scripts %}{% endblock %}
</body>
</html>
